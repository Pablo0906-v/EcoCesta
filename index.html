<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoCesta Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #5cb85c; --bg: #f2f9f2; --card: #ffffff; 
            --text-main: #2d3436; --text-sec: #636e72; 
            --urgent: #ff7675; --next: #fab1a0; --safe: #55efc4;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 0; }
        
        header { padding: 30px 20px 10px; text-align: center; }
        .logo-text { color: var(--primary); font-size: 2.2rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
        
        .page { display: none; padding: 0 18px; animation: slideUp 0.3s ease-out; }
        .page.active { display: block; }

        /* BOTÓN ESCANEAR REAL */
        .scan-container { display: flex; justify-content: center; margin: 30px 0; position: relative; }
        .btn-scan-circle { width: 140px; height: 140px; background: linear-gradient(135deg, #5cb85c, #4cae4c); border-radius: 50%; border: 8px solid white; box-shadow: 0 10px 25px rgba(92,184,92,0.3); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; cursor: pointer; position: relative; overflow: hidden; }
        
        /* Input invisible para activar cámara */
        #camera-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        /* FORMULARIO PERFIL */
        .profile-card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .profile-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #eee; border-radius: 12px; font-family: 'Inter'; box-sizing: border-box; }
        .btn-save { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: 700; margin-top: 10px; }

        /* NAVEGACIÓN */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0 30px; border-top: 1px solid rgba(0,0,0,0.05); }
        .nav-btn { border: none; background: none; color: #b2bec3; font-size: 0.65rem; font-weight: 700; cursor: pointer; }
        .nav-btn.active { color: var(--primary); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="app-content">
    <header>
        <p class="logo-text">EcoCesta</p>
        <h2 id="display-name" style="font-size: 1.2rem; margin-top: 10px;">¡Hola, Diego!</h2>
    </header>

    <div id="page-inicio" class="page active">
        <div class="scan-container">
            <div class="btn-scan-circle">
                <div style="font-size: 2rem;">📸</div>
                <span>ESCANEAR<br>TICKET</span>
                <input type="file" accept="image/*" capture="camera" id="camera-input" onchange="procesarFoto(event)">
            </div>
        </div>
        <p style="text-align: center; color: var(--text-sec); font-size: 0.8rem;">Ahorro Semanal: <strong>$15 USD</strong></p>
    </div>

    <div id="page-perfil" class="page">
        <h3 style="margin-bottom: 20px;">Mi Perfil</h3>
        <div class="profile-card">
            <label style="font-size: 0.8rem; font-weight: 700;">NOMBRE</label>
            <input type="text" id="edit-name" class="profile-input" placeholder="Tu nombre">
            
            <label style="font-size: 0.8rem; font-weight: 700;">META DE AHORRO ($)</label>
            <input type="number" id="edit-goal" class="profile-input" placeholder="Ej: 50">
            
            <button class="btn-save" onclick="guardarPerfil()">Guardar Cambios</button>
            <button onclick="cerrarSesion()" style="margin-top: 20px; color: #ff7675; border: none; background: none; width: 100%; font-size: 0.8rem;">Cerrar Sesión</button>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-btn active" onclick="nav('inicio', this)">INICIO</button>
        <button class="nav-btn" onclick="nav('perfil', this)">PERFIL</button>
    </nav>
</div>

<script>
    // Cargar datos guardados
    let userData = JSON.parse(localStorage.getItem('eco_user_data')) || { name: 'Diego', goal: 15 };

    function init() {
        document.getElementById('display-name').innerText = `¡Hola, ${userData.name}!`;
        document.getElementById('edit-name').value = userData.name;
        document.getElementById('edit-goal').value = userData.goal;
    }

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(`page-${id}`).classList.add('active');
        el.classList.add('active');
    }

    function guardarPerfil() {
        userData.name = document.getElementById('edit-name').value;
        userData.goal = document.getElementById('edit-goal').value;
        localStorage.setItem('eco_user_data', JSON.stringify(userData));
        init();
        alert("¡Datos actualizados!");
        nav('inicio', document.querySelector('.nav-btn'));
    }

    function procesarFoto(event) {
        const file = event.target.files[0];
        if (file) {
            alert("Foto capturada con éxito. Procesando ticket con IA...");
            // Aquí en el futuro conectarías con un servicio de OCR
        }
    }

    function cerrarSesion() {
        if(confirm("¿Seguro que quieres salir?")) {
            localStorage.clear();
            location.reload();
        }
    }

    window.onload = init;
</script>
</body>
</html>
