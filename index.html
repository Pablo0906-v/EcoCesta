<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoCesta | Minimalist Pantry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        :root {
            /* Paleta de Colores Sofisticada */
            --bg: #0b0f19;          /* Fondo casi negro, muy profundo */
            --card-bg: rgba(22, 29, 45, 0.6); /* Cristal oscuro */
            --primary: #ffffff;      /* Blanco puro para contraste máximo */
            --accent: #10b981;       /* Verde esmeralda sutil */
            --danger: #ef4444;       /* Rojo suave */
            --warning: #f59e0b;      /* Ámbar sutil */
            --text-main: #f8fafc;    /* Blanco roto */
            --text-muted: #64748b;  /* Gris azulado */
            --border: rgba(255, 255, 255, 0.06);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(at 10% 10%, rgba(16, 185, 129, 0.08) 0px, transparent 50%),
                              radial-gradient(at 90% 90%, rgba(30, 41, 59, 0.2) 0px, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            width: 100%;
            max-width: 460px;
            animation: fadeIn 1s ease-out;
        }

        /* Cabecera Minimalista */
        header {
            text-align: left;
            margin-bottom: 40px;
            padding-left: 10px;
            padding-top: 20px;
        }

        h1 {
            font-weight: 700;
            font-size: 2.6rem;
            margin: 0;
            letter-spacing: -1.5px;
            color: var(--primary);
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 300;
            margin: 5px 0 0;
            letter-spacing: 0.5px;
        }

        /* Visor de Cámara Refinado */
        #interactive.viewport {
            width: 100%;
            height: 320px;
            border-radius: 30px;
            overflow: hidden;
            background: #000;
            margin-bottom: 30px;
            border: 1px solid var(--border);
            display: none;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        #interactive.viewport video { width: 100%; height: 100%; object-fit: cover; }

        /* Línea de Escaneo Minimalista (Punto Central) */
        .scan-target {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 200px; height: 100px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            z-index: 10;
        }
        .scan-target::after {
            content: "";
            position: absolute;
            top: 50%; left: 0; width: 100%; height: 1px;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            animation: scanLine 2s infinite ease-in-out;
        }

        @keyframes scanLine {
            0%, 100% { transform: translateY(-40px); opacity: 0; }
            50% { transform: translateY(40px); opacity: 1; }
        }

        /* Lista de Productos y Tarjetas Elegantes */
        .product-list { display: grid; gap: 16px; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 22px;
            border-radius: 24px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .card:hover {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .info h3 { margin: 0; font-size: 1.15rem; font-weight: 600; color: var(--primary); letter-spacing: -0.3px; }
        .info p { margin: 6px 0 0; font-size: 0.85rem; color: var(--text-muted); font-weight: 300; }

        /* Indicadores de Estado Simplificados */
        .status-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background-color: var(--accent); /* Fresco por defecto */
            position: relative;
        }
        .status-dot::after {
            content: "";
            position: absolute;
            top: -4px; left: -4px; bottom: -4px; right: -4px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            opacity: 0.3;
        }

        .urgent .status-dot { background-color: var(--danger); }
        .urgent .status-dot::after { border-color: var(--danger); animation: pulseDanger 2s infinite; }

        .soon .status-dot { background-color: var(--warning); }
        .soon .status-dot::after { border-color: var(--warning); }

        @keyframes pulseDanger {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        /* Botón de Acción Principal (FAB Refinado) */
        .btn-scan {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: var(--bg);
            padding: 18px 40px;
            border-radius: 50px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 100;
            display: flex; align-items: center; gap: 12px;
            letter-spacing: -0.2px;
        }

        .btn-scan:hover {
            transform: translateX(-50%) translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .btn-scan svg { width: 20px; height: 20px; fill: var(--bg); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>EcoCesta</h1>
        <p id="instrucciones">Smart Pantry Management</p>
    </header>

    <div id="interactive" class="viewport">
        <div class="scan-target"></div>
    </div>

    <div class="product-list" id="lista-main">
        </div>
</div>

<button class="btn-scan" onclick="toggleScanner()">
    <svg viewBox="0 0 24 24"><path d="M4 4h4.01V2H4c-1.1 0-2 .89-2 2v4.01h2V4zm16 0v4.01h2V4c0-1.11-.89-2-2-2h-4.01v2H20zM4 20h4.01v2H4c-1.1 0-2-.9-2-2v-4.01h2V20zm16 0v-4.01h2V20c0 1.1-.89 2-2 2h-4.01v2H20zM7 11h10v2H7v-2zm-1 3.5h12v2H6v-2zm2-7h8v2H8v-2z"></path></svg>
    <span>ESCANEAR</span>
</button>

<script>
    // Inventario simulado con datos refinados
    let productos = [
        { nombre: "Organic Milk", marca: "Lala", vence: "Mar 16, 2026", dias: 7 },
        { nombre: "Chicken Breast", marca: "Bachoco", vence: "Mar 12, 2026", dias: 2 },
        { nombre: "Greek Yogurt", marca: "Fage", vence: "Mar 14, 2026", dias: 5 }
    ];

    function render() {
        const list = document.getElementById('lista-main');
        list.innerHTML = '';
        
        productos.sort((a,b) => a.dias - b.dias).forEach(p => {
            let statusClass = '';
            
            if (p.dias <= 3) { statusClass = 'urgent'; }
            else if (p.dias <= 5) { statusClass = 'soon'; }

            list.innerHTML += `
                <div class="card ${statusClass}">
                    <div class="info">
                        <h3>${p.nombre}</h3>
                        <p>${p.marca} • Exp. ${p.vence}</p>
                    </div>
                    <div class="status-dot"></div>
                </div>`;
        });
    }

    let isScanning = false;

    function toggleScanner() {
        const view = document.getElementById('interactive');
        const btnText = document.querySelector('.btn-scan span');

        if (!isScanning) {
            view.style.display = 'block';
            btnText.innerText = "CANCELAR";
            
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: view, constraints: { facingMode: "environment" } },
                decoder: { readers: ["ean_reader", "ean_8_reader", "code_128_reader"] }
            }, (err) => {
                if (err) { alert("Abre con Live Server."); stopScan(); return; }
                Quagga.start();
                isScanning = true;
                document.getElementById('instrucciones').innerText = "Center barcode in the area";
            });
        } else {
            stopScan();
        }
    }

    function stopScan() {
        Quagga.stop();
        document.getElementById('interactive').style.display = 'none';
        document.querySelector('.btn-scan span').innerText = "ESCANEAR";
        isScanning = false;
        document.getElementById('instrucciones').innerText = "Smart Pantry Management";
    }

    Quagga.onDetected(data => {
        const code = data.codeResult.code;
        // Agregamos producto simulado
        productos.unshift({ nombre: "New Item", marca: "Scanner", vence: "Mar 25, 2026", dias: 15 });
        
        // Sonido suave de éxito (simulado)
        if(window.navigator.vibrate) window.navigator.vibrate(100);

        setTimeout(() => {
            stopScan();
            render();
        }, 500);
    });

    // Carga inicial
    render();
</script>

</body>
</html>
