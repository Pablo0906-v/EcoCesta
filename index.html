<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCesta Pro | Smart App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: #10b981; --bg: #f8fafc; --card: #ffffff; 
            --text-main: #1e293b; --text-sec: #64748b; 
            --btn-bg: #1e293b; --btn-text: #ffffff; --shadow: rgba(0,0,0,0.05);
        }
        .dark-mode {
            --bg: #0b0f1a; --card: #161d2f; --text-main: #ffffff; 
            --text-sec: #94a3b8; --btn-bg: #ffffff; --btn-text: #000000; 
            --shadow: rgba(0,0,0,0.3);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 0; transition: 0.5s; overflow-x: hidden; }
        
        /* LOGIN */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .login-box { background: var(--card); padding: 40px 30px; border-radius: 30px; box-shadow: 0 10px 30px var(--shadow); width: 100%; max-width: 380px; text-align: center; }
        .login-box h2 { margin-bottom: 25px; font-weight: 800; color: var(--primary); font-size: 2.2rem; }
        .login-box input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(128,128,128,0.2); border-radius: 12px; background: var(--bg); color: var(--text-main); font-size: 1rem; box-sizing: border-box; }
        
        /* APP CONTENT */
        #app-content { display: none; padding: 20px; min-height: 100vh; flex-direction: column; align-items: center; }
        .app-inner { width: 100%; max-width: 450px; padding-bottom: 140px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; width: 100%; }
        .profile-area { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }

        /* SECCIÓN ESTADÍSTICAS */
        .stats-container { background: var(--card); padding: 20px; border-radius: 24px; margin-bottom: 20px; box-shadow: 0 4px 12px var(--shadow); }
        .stats-container h4 { margin: 0 0 15px 0; font-size: 0.9rem; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1px; }
        canvas { max-height: 180px; }

        #interactive.viewport { width: 100%; height: 250px; border-radius: 24px; overflow: hidden; background: #000; margin-bottom: 25px; border: 4px solid var(--card); display: none; position: relative; }
        .laser { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: var(--primary); z-index: 10; }
        
        .product-list { display: flex; flex-direction: column; gap: 12px; }
        .card { background: var(--card); padding: 18px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 12px var(--shadow); border: 1px solid rgba(128,128,128,0.1); animation: fadeIn 0.4s ease-out; position: relative; cursor: pointer; }
        
        .info h3 { margin: 0; font-size: 1.1rem; font-weight: 700; text-transform: capitalize; color: var(--text-main); }
        .info p { margin: 2px 0; font-size: 0.85rem; color: var(--text-sec); }
        .vence-text { font-weight: 700; font-size: 0.88rem; margin-top: 8px; display: block; }

        /* MODALES */
        #modal-ia { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 6000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); width: 85%; max-width: 350px; padding: 30px; border-radius: 28px; text-align: center; }
        
        .nav-actions { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; width: 90%; max-width: 400px; z-index: 1000; }
        .btn { flex: 1; padding: 18px; border-radius: 20px; font-weight: 700; border: none; cursor: pointer; }
        .btn-main { background: var(--btn-bg); color: var(--btn-text); }
        .btn-sec { background: var(--card); color: var(--text-main); border: 1px solid rgba(128,128,128,0.2); }
        .btn-delete { position: absolute; top: 18px; right: 18px; background: rgba(128,128,128,0.1); border: none; color: var(--text-sec); border-radius: 50%; width: 28px; height: 28px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body id="body-tag">

<div id="login-screen">
    <div class="login-box">
        <h2>EcoCesta</h2>
        <input type="text" id="user" placeholder="Nombre de usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button class="btn btn-main" style="width: 100%;" onclick="login()">Iniciar Sesión</button>
        <p style="font-size: 0.8rem; color: var(--text-sec); margin-top: 15px;">Tus datos se guardan de forma local (Offline Ready)</p>
    </div>
</div>

<div id="modal-ia" onclick="cerrarIA()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 id="ia-titulo">Consejo de amigo</h2>
        <p id="ia-consejo"></p>
        <button class="btn btn-main" style="width: 100%; margin-top: 20px;" onclick="cerrarIA()">¡Gracias!</button>
    </div>
</div>

<div id="app-content">
    <div class="app-inner">
        <header>
            <div>
                <h1 style="font-size: 1.8rem;">EcoCesta</h1>
                <p id="msg" style="margin:0;">Cargando...</p>
            </div>
            <div class="profile-area">
                <span id="user-display" style="font-weight: 600; font-size: 0.9rem;"></span>
                <div class="avatar" id="user-avatar">?</div>
            </div>
        </header>

        <div class="stats-container">
            <h4>Análisis de Inventario</h4>
            <canvas id="myChart"></canvas>
        </div>

        <div id="interactive" class="viewport"><div class="laser"></div></div>
        <div class="product-list" id="main-list"></div>
    </div>

    <div class="nav-actions">
        <button class="btn btn-sec" onclick="agregarManual()">✍️ Manual</button>
        <button class="btn btn-main" onclick="toggleScanner()" id="scanBtn">📸 Escanear</button>
    </div>
</div>

<script>
    let productos = JSON.parse(localStorage.getItem('ecocesta_data')) || [];
    let myChart = null;

    // --- PUNTO 3: PERSISTENCIA DE SESIÓN ---
    window.onload = () => {
        const sesion = localStorage.getItem('ecocesta_session');
        if (sesion) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'flex';
            document.getElementById('user-display').innerText = sesion;
            document.getElementById('user-avatar').innerText = sesion.charAt(0).toUpperCase();
            inicializarApp();
        }
    };

    function login() {
        const u = document.getElementById('user').value;
        if(u !== "") {
            localStorage.setItem('ecocesta_session', u); // Guardar sesión
            location.reload(); // Recargar para activar onload
        }
    }

    function inicializarApp() {
        aplicarTema();
        actualizarGrafica();
        render();
        checarNotificaciones(); // PUNTO 2
    }

    // --- PUNTO 5: GRÁFICAS DE DESPERDICIO ---
    function actualizarGrafica() {
        const ctx = document.getElementById('myChart').getContext('2d');
        const conteo = { 'Lácteo': 0, 'Proteína': 0, 'Abarrote': 0, 'Otros': 0 };
        
        productos.forEach(p => {
            if (conteo[p.catLabel] !== undefined) conteo[p.catLabel]++;
            else conteo['Otros']++;
        });

        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(conteo),
                datasets: [{
                    data: Object.values(conteo),
                    backgroundColor: ['#f59e0b', '#ef4444', '#10b981', '#64748b'],
                    borderWidth: 0
                }]
            },
            options: {
                plugins: { legend: { position: 'right', labels: { color: getComputedStyle(document.body).getPropertyValue('--text-main') } } }
            }
        });
    }

    // --- PUNTO 2: LÓGICA DE ALERTAS ---
    function checarNotificaciones() {
        const hoy = new Date();
        const productosProximos = productos.filter(p => {
            const vence = new Date(p.venceRaw);
            const dif = (vence - hoy) / (1000 * 60 * 60 * 24);
            return dif >= 0 && dif <= 2; // Vence en 2 días o menos
        });

        if (productosProximos.length > 0) {
            document.getElementById('msg').innerText = `⚠️ Tienes ${productosProximos.length} productos por vencer`;
            document.getElementById('msg').style.color = "#ef4444";
        }
    }

    const CATEGORIAS = {
        lacteos: { dias: 15, label: "Lácteo", color: "#f59e0b", care: "No lo dejes en la puerta del refri, mejor al fondo." },
        carnes: { dias: 4, label: "Proteína", color: "#ef4444", care: "Si no lo cocinas mañana, congélalo ya." },
        granos: { dias: 180, label: "Abarrote", color: "#10b981", care: "Frasco de vidrio si hay humedad." },
        otros: { dias: 21, label: "Otros", color: "#64748b", care: "Revísalo bien antes de usar." }
    };

    function obtenerCategoria(nombre) {
        const n = nombre.toLowerCase();
        if (n.includes("leche") || n.includes("crema") || n.includes("queso")) return CATEGORIAS.lacteos;
        if (n.includes("pollo") || n.includes("carne") || n.includes("jamon")) return CATEGORIAS.carnes;
        if (n.includes("frijol") || n.includes("pasta") || n.includes("arroz")) return CATEGORIAS.granos;
        return CATEGORIAS.otros;
    }

    function render() {
        const list = document.getElementById('main-list');
        localStorage.setItem('ecocesta_data', JSON.stringify(productos));
        list.innerHTML = productos.length === 0 ? '<p style="text-align:center; color:gray;">Cesta vacía</p>' : '';
        
        productos.forEach((p, i) => {
            list.innerHTML += `
                <div class="card" onclick="abrirIA('${p.nombre}', '${p.care}')">
                    <div style="display:flex; align-items:center;">
                        <div class="status-dot" style="background-color:${p.color};"></div>
                        <div class="info">
                            <h3>${p.nombre}</h3>
                            <p>${p.marca} • Ingreso: ${p.fechaIngreso}</p>
                            <span class="vence-text" style="color:${p.color};">Vence: ${p.venceFinal}</span>
                        </div>
                    </div>
                    <button class="btn-delete" onclick="event.stopPropagation(); eliminar(${i});">✕</button>
                </div>`;
        });
    }

    function procesarProducto(nombre, marca) {
        const cat = obtenerCategoria(nombre);
        const hoy = new Date();
        const fechaVence = new Date();
        fechaVence.setDate(hoy.getDate() + cat.dias);

        productos.unshift({ 
            nombre, marca, 
            fechaIngreso: hoy.toLocaleDateString('es-MX', {day:'numeric', month:'short'}),
            venceFinal: fechaVence.toLocaleDateString('es-MX', {day:'2-digit', month:'2-digit', year:'numeric'}),
            venceRaw: fechaVence.toISOString(), // Para cálculos de alertas
            color: cat.color,
            care: cat.care,
            catLabel: cat.label
        });
        actualizarGrafica();
        render();
        checarNotificaciones();
    }

    function eliminar(i) { productos.splice(i, 1); actualizarGrafica(); render(); checarNotificaciones(); }
    function abrirIA(n, c) { document.getElementById('ia-consejo').innerText = c; document.getElementById('modal-ia').style.display = 'flex'; }
    function cerrarIA() { document.getElementById('modal-ia').style.display = 'none'; }
    function aplicarTema() { if (new Date().getHours() >= 18 || new Date().getHours() < 6) document.body.classList.add('dark-mode'); }
    
    // Simulación de Escáner y Manual (Igual que antes)
    function agregarManual() { const n = prompt("Nombre:"); const m = prompt("Marca:"); if(n) procesarProducto(n, m); }
    function toggleScanner() { alert("Simulando cámara para el prototipo..."); agregarManual(); }
</script>
</body>
</html>
