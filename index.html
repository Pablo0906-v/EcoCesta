<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCesta | Smart Life Cycle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        :root { 
            --primary: #10b981; --bg: #f8fafc; --card: #ffffff; 
            --text-main: #1e293b; --text-sec: #64748b; 
            --btn-bg: #1e293b; --btn-text: #ffffff; --shadow: rgba(0,0,0,0.05);
        }
        .dark-mode {
            --bg: #0b0f1a; --card: #161d2f; --text-main: #ffffff; 
            --text-sec: #94a3b8; --btn-bg: #ffffff; --btn-text: #000000; 
            --shadow: rgba(0,0,0,0.3);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; transition: 0.5s; }
        .app-container { width: 100%; max-width: 450px; padding-bottom: 140px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary); margin: 0; font-size: 2.2rem; font-weight: 800; }
        #msg { color: var(--text-sec); font-size: 0.9rem; margin-top: 5px; font-weight: 600; }
        
        #interactive.viewport { width: 100%; height: 250px; border-radius: 24px; overflow: hidden; background: #000; margin-bottom: 25px; border: 4px solid var(--card); box-shadow: 0 10px 25px var(--shadow); display: none; position: relative; }
        .laser { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: var(--primary); z-index: 10; }
        
        .product-list { display: flex; flex-direction: column; gap: 12px; }
        .card { background: var(--card); padding: 18px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 12px var(--shadow); border: 1px solid rgba(128,128,128,0.1); animation: fadeIn 0.4s ease-out; }
        
        .info h3 { margin: 0; font-size: 1.05rem; font-weight: 700; text-transform: capitalize; }
        .info p { margin: 4px 0 0; font-size: 0.82rem; color: var(--text-sec); line-height: 1.4; }
        .days-tag { font-weight: 800; font-size: 0.75rem; text-transform: uppercase; padding: 2px 8px; border-radius: 6px; margin-top: 4px; display: inline-block; }
        
        .status-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 12px; }
        .nav-actions { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; width: 90%; max-width: 400px; z-index: 1000; }
        .btn { flex: 1; padding: 18px; border-radius: 20px; font-weight: 700; border: none; cursor: pointer; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main { background: var(--btn-bg); color: var(--btn-text); }
        .btn-sec { background: var(--card); color: var(--text-main); border: 1px solid rgba(128,128,128,0.2); }
        .btn-delete { background: rgba(128,128,128,0.1); border: none; color: var(--text-sec); cursor: pointer; border-radius: 50%; width: 30px; height: 30px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body id="body-tag">
<div class="app-container">
    <header><h1>EcoCesta</h1><p id="msg">Calculando frescura...</p></header>
    <div id="interactive" class="viewport"><div class="laser"></div></div>
    <div class="product-list" id="main-list"></div>
</div>
<div class="nav-actions">
    <button class="btn btn-sec" onclick="agregarManual()">✍️ Manual</button>
    <button class="btn btn-main" onclick="toggleScanner()" id="scanBtn">📸 Escanear</button>
</div>

<script>
    let productos = JSON.parse(localStorage.getItem('ecocesta_data')) || [];

    // --- CONFIGURACIÓN DE VIDA ÚTIL POR CATEGORÍA ---
    const VIDA_UTIL = {
        lacteos: { dias: 15, msg: "Consumir en 15 días (Lácteo)" },
        carnes: { dias: 4, msg: "Consumir en 4 días (Proteína)" },
        granos: { dias: 180, msg: "Dura 6 meses (Abarrotes)" },
        especias: { dias: 365, msg: "Dura 1 año (Condimento)" },
        cafe: { dias: 120, msg: "Consumir en 4 meses (Café)" },
        snacks: { dias: 60, msg: "Consumir en 2 meses (Snack)" },
        desconocido: { dias: 21, msg: "Consumir en 21 días (Genérico)" }
    };

    function aplicarTema() {
        const hora = new Date().getHours();
        const body = document.getElementById('body-tag');
        if (hora >= 18 || hora < 6) body.classList.add('dark-mode');
        document.getElementById('msg').innerText = (hora >= 18 || hora < 6) ? "Modo Noche 🌙" : "Modo Día ☀️";
    }

    // --- CEREBRO DE CLASIFICACIÓN ---
    function obtenerCategoria(nombre) {
        const n = nombre.toLowerCase();
        if (n.includes("leche") || n.includes("crema") || n.includes("yogurt") || n.includes("queso") || n.includes("arroz")) return VIDA_UTIL.lacteos;
        if (n.includes("pollo") || n.includes("carne") || n.includes("jamon") || n.includes("pescado")) return VIDA_UTIL.carnes;
        if (n.includes("frijol") || n.includes("pasta") || n.includes("aceite") || n.includes("lata")) return VIDA_UTIL.granos;
        if (n.includes("sal") || n.includes("ajo") || n.includes("pimienta") || n.includes("clavo")) return VIDA_UTIL.especias;
        if (n.includes("cafe") || n.includes("café")) return VIDA_UTIL.cafe;
        if (n.includes("galleta") || n.includes("papas") || n.includes("sabritas") || n.includes("pan")) return VIDA_UTIL.snacks;
        return VIDA_UTIL.desconocido;
    }

    function render() {
        const list = document.getElementById('main-list');
        localStorage.setItem('ecocesta_data', JSON.stringify(productos));
        if (productos.length === 0) {
            list.innerHTML = `<div style="text-align:center; padding-top:60px;"><p style="color:var(--text-sec);">Inventario vacío</p></div>`;
            return;
        }
        list.innerHTML = '';
        productos.forEach((p, i) => {
            const color = p.catMsg.includes("4 días") ? "#ef4444" : (p.catMsg.includes("15 días") ? "#f59e0b" : "#10b981");
            list.innerHTML += `<div class="card">
                <div style="display:flex; align-items:center;">
                    <div class="status-dot" style="background-color:${color};"></div>
                    <div class="info">
                        <h3>${p.nombre}</h3>
                        <p>${p.marca} • Ingreso: ${p.fechaIngreso}</p>
                        <span class="days-tag" style="background:${color}22; color:${color};">${p.catMsg}</span>
                    </div>
                </div>
                <button class="btn-delete" onclick="eliminar(${i})">✕</button>
            </div>`;
        });
    }

    function eliminar(i) { productos.splice(i, 1); render(); }

    function procesarProducto(nombre, marca) {
        const cat = obtenerCategoria(nombre);
        const hoy = new Date().toLocaleDateString('es-MX', { day: 'numeric', month: 'short' });
        
        productos.unshift({ 
            nombre, 
            marca, 
            fechaIngreso: hoy,
            catMsg: cat.msg 
        });
        render();
    }

    async function buscarProducto(codigo) {
        try {
            const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${codigo}.json`);
            const data = await res.json();
            if (data.status === 1) return { nombre: data.product.product_name, marca: data.product.brands || "Marca detectada" };
        } catch (e) {}
        return null;
    }

    function agregarManual() {
        const nombre = prompt("Nombre del producto:"); if (!nombre) return;
        const marca = prompt("Marca:", "Manual");
        procesarProducto(nombre, marca);
    }

    let isScanning = false;
    function toggleScanner() {
        const view = document.getElementById('interactive');
        if (!isScanning) {
            view.style.display = 'block'; isScanning = true;
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: view, constraints: { facingMode: "environment" } },
                decoder: { readers: ["ean_reader"] }
            }, (err) => { if (!err) Quagga.start(); });
        } else { stopScan(); }
    }

    function stopScan() { Quagga.stop(); document.getElementById('interactive').style.display = 'none'; isScanning = false; }

    Quagga.onDetected(async (data) => {
        if (data.codeResult.code.length < 12) return;
        stopScan();
        let info = await buscarProducto(data.codeResult.code);
        if (!info) {
            const nom = prompt("No reconocido. ¿Qué es?"); if(!nom) return;
            info = { nombre: nom, marca: "Escaneado" };
        }
        procesarProducto(info.nombre, info.marca);
    });

    aplicarTema(); render();
</script>
</body>
</html>
