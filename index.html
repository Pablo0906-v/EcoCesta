<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCesta Pro | Smart Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        :root { --primary: #10b981; --bg: #0b0f1a; --card: #161d2f; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; padding-bottom: 100px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary); margin: 0; font-size: 2rem; }
        #msg { color: #94a3b8; font-size: 0.9rem; margin-top: 5px; height: 20px; }

        #interactive.viewport {
            width: 100%; height: 250px; border-radius: 20px; overflow: hidden;
            background: #000; margin-bottom: 20px; border: 2px solid var(--primary);
            display: none; position: relative;
        }
        #interactive.viewport video { width: 100%; height: 100%; object-fit: cover; }
        .laser { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: var(--primary); box-shadow: 0 0 15px var(--primary); animation: scan 2s infinite linear; z-index: 10; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .product-list { display: flex; flex-direction: column; gap: 12px; }
        .card { background: var(--card); padding: 18px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .info h3 { margin: 0; font-size: 1rem; color: #fff; }
        .info p { margin: 4px 0 0; font-size: 0.8rem; color: #94a3b8; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 0 10px currentColor; }

        .btn-scan {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: white; color: black; padding: 16px 40px; border-radius: 50px;
            font-weight: bold; border: none; cursor: pointer; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-size: 1rem; z-index: 1000;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>EcoCesta</h1>
        <p id="msg">Listo para gestionar tu alacena</p>
    </header>

    <div id="interactive" class="viewport"><div class="laser"></div></div>
    <div class="product-list" id="main-list"></div>
</div>

<button class="btn-scan" onclick="toggleScanner()" id="scanBtn">
    <span id="btnIcon">🔍</span> <span id="btnText">ESCANEAR</span>
</button>

<script>
    let productos = [
        { nombre: "Pechuga de Pollo", marca: "Bachoco", vence: "12/03/2026", color: "#ef4444" },
        { nombre: "Yogurt Griego", marca: "Fage", vence: "14/03/2026", color: "#f59e0b" },
        { nombre: "Leche Orgánica", marca: "Lala", vence: "16/03/2026", color: "#10b981" }
    ];

    function render() {
        const list = document.getElementById('main-list');
        list.innerHTML = '';
        productos.forEach(p => {
            list.innerHTML += `
                <div class="card">
                    <div class="info">
                        <h3>${p.nombre}</h3>
                        <p>${p.marca} • Exp. ${p.vence}</p>
                    </div>
                    <div class="status-dot" style="color: ${p.color}; background: currentColor;"></div>
                </div>`;
        });
    }

    let isScanning = false;

    async function buscarProducto(codigo) {
        document.getElementById('msg').innerText = "Buscando en la base de datos...";
        try {
            const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${codigo}.json`);
            const data = await res.json();
            
            if (data.status === 1) {
                return {
                    nombre: data.product.product_name || "Producto sin nombre",
                    marca: data.product.brands || "Genérico"
                };
            }
        } catch (e) { console.error("Error API:", e); }
        return { nombre: "Producto " + codigo.slice(-4), marca: "Scanner" };
    }

    function toggleScanner() {
        const view = document.getElementById('interactive');
        const btnText = document.getElementById('btnText');
        
        if (!isScanning) {
            view.style.display = 'block';
            btnText.innerText = "DETENER";
            isScanning = true;
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: view, constraints: { facingMode: "environment" } },
                decoder: { readers: ["ean_reader", "ean_8_reader", "code_128_reader"] }
            }, (err) => {
                if (err) return;
                Quagga.start();
            });
        } else {
            stopScan();
        }
    }

    function stopScan() {
        Quagga.stop();
        document.getElementById('interactive').style.display = 'none';
        document.getElementById('btnText').innerText = "ESCANEAR";
        isScanning = false;
    }

    Quagga.onDetected(async (data) => {
        const code = data.codeResult.code;
        stopScan();
        
        const info = await buscarProducto(code);
        
        // Fecha de vencimiento simulada (10 días después de hoy)
        const fecha = new Date();
        fecha.setDate(fecha.getDate() + 10);
        
        productos.unshift({
            nombre: info.nombre,
            marca: info.marca,
            vence: fecha.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
            color: "#10b981"
        });
        
        document.getElementById('msg').innerText = "¡Agregado con éxito!";
        render();
    });

    render();
</script>
</body>
</html>
