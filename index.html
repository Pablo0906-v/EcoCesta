<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCesta | Login & Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        :root { 
            --primary: #10b981; --bg: #f8fafc; --card: #ffffff; 
            --text-main: #1e293b; --text-sec: #64748b; 
            --btn-bg: #1e293b; --btn-text: #ffffff; --shadow: rgba(0,0,0,0.05);
        }
        .dark-mode {
            --bg: #0b0f1a; --card: #161d2f; --text-main: #ffffff; 
            --text-sec: #94a3b8; --btn-bg: #ffffff; --btn-text: #000000; 
            --shadow: rgba(0,0,0,0.3);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 0; transition: 0.5s; overflow-x: hidden; }
        
        /* PANTALLA DE LOGIN */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .login-box { background: var(--card); padding: 40px 30px; border-radius: 30px; box-shadow: 0 10px 30px var(--shadow); width: 100%; max-width: 380px; text-align: center; }
        .login-box h2 { margin-bottom: 25px; font-weight: 800; color: var(--primary); font-size: 2rem; }
        .login-box input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(128,128,128,0.2); border-radius: 12px; background: var(--bg); color: var(--text-main); font-size: 1rem; box-sizing: border-box; }
        
        /* APP CONTAINER */
        #app-content { display: none; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .app-inner { width: 100%; max-width: 450px; padding-bottom: 140px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary); margin: 0; font-size: 2.2rem; font-weight: 800; }
        #msg { color: var(--text-sec); font-size: 0.9rem; margin-top: 5px; font-weight: 600; }
        
        #interactive.viewport { width: 100%; height: 250px; border-radius: 24px; overflow: hidden; background: #000; margin-bottom: 25px; border: 4px solid var(--card); box-shadow: 0 10px 25px var(--shadow); display: none; position: relative; }
        .laser { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: var(--primary); z-index: 10; }
        
        .product-list { display: flex; flex-direction: column; gap: 12px; }
        .card { background: var(--card); padding: 18px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 12px var(--shadow); border: 1px solid rgba(128,128,128,0.1); animation: fadeIn 0.4s ease-out; position: relative; cursor: pointer; }
        
        .info h3 { margin: 0; font-size: 1.1rem; font-weight: 700; text-transform: capitalize; padding-right: 25px; color: var(--text-main); }
        .info p { margin: 2px 0; font-size: 0.85rem; color: var(--text-sec); }
        .vence-text { font-weight: 700; font-size: 0.88rem; margin-top: 8px; display: block; }
        
        /* MODAL CONSEJO AMIGO */
        #modal-ia { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); width: 85%; max-width: 350px; padding: 30px; border-radius: 28px; text-align: center; }
        .modal-content h2 { margin-top: 0; color: var(--text-main); font-size: 1.3rem; font-weight: 700; }
        .modal-content p { font-size: 1rem; line-height: 1.5; color: var(--text-sec); font-style: italic; }
        .btn-close { background: var(--primary); color: white; border: none; padding: 14px 25px; border-radius: 15px; font-weight: 700; margin-top: 20px; cursor: pointer; width: 100%; }

        .status-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 14px; flex-shrink: 0; }
        .nav-actions { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; width: 90%; max-width: 400px; z-index: 1000; }
        .btn { flex: 1; padding: 18px; border-radius: 20px; font-weight: 700; border: none; cursor: pointer; }
        .btn-main { background: var(--btn-bg); color: var(--btn-text); }
        .btn-sec { background: var(--card); color: var(--text-main); border: 1px solid rgba(128,128,128,0.2); }
        .btn-delete { position: absolute; top: 18px; right: 18px; background: rgba(128,128,128,0.1); border: none; color: var(--text-sec); cursor: pointer; border-radius: 50%; width: 28px; height: 28px; z-index: 10; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body id="body-tag">

<div id="login-screen">
    <div class="login-box">
        <h2>EcoCesta</h2>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button class="btn btn-main" style="width: 100%;" onclick="login()">Entrar</button>
    </div>
</div>

<div id="modal-ia" onclick="cerrarIA()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 id="ia-titulo">Consejo de amigo</h2>
        <p id="ia-consejo">Cargando...</p>
        <button class="btn-close" onclick="cerrarIA()">Gracias!</button>
    </div>
</div>

<div id="app-content">
    <div class="app-inner">
        <header><h1>EcoCesta</h1><p id="msg">Analizando frescura...</p></header>
        <div id="interactive" class="viewport"><div class="laser"></div></div>
        <div class="product-list" id="main-list"></div>
    </div>
    <div class="nav-actions">
        <button class="btn btn-sec" onclick="agregarManual()">✍️ Manual</button>
        <button class="btn btn-main" onclick="toggleScanner()" id="scanBtn">📸 Escanear</button>
    </div>
</div>

<script>
    let productos = JSON.parse(localStorage.getItem('ecocesta_data')) || [];

    // LÓGICA DE LOGIN SENCILLO
    function login() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u !== "" && p !== "") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'flex';
            aplicarTema();
            render();
        } else {
            alert("Por favor llena los campos");
        }
    }

    const CATEGORIAS = {
        lacteos: { dias: 15, msg: "Lácteo", color: "#f59e0b", care: "Oye, como es un lácteo, trata de no dejarlo en la puerta del refri, ahí cambia mucho la temperatura. Mejor ponlo al fondo." },
        carnes: { dias: 4, msg: "Proteína", color: "#ef4444", care: "Brother, esto se echa a perder rápido. Si no lo vas a cocinar mañana, mejor mételo al congelador de una vez." },
        granos: { dias: 180, msg: "Abarrote", color: "#10b981", care: "Mantén esto en un lugar seco. Si ves que hay humedad, mejor cámbialo a un frasco de vidrio." },
        especias: { dias: 365, msg: "Condimento", color: "#10b981", care: "No lo dejes cerca de la estufa mientras cocinas, el vapor hace que se peguen y pierdan el sabor." },
        cafe: { dias: 120, msg: "Café", color: "#10b981", care: "Para que te siga sabiendo rico, guárdalo en un bote que no le pase la luz. El café odia el sol." },
        snacks: { dias: 60, msg: "Snack", color: "#10b981", care: "Dóblale bien la bolsa o ponle una pinza, ya ves que luego se ponen aguadas las papas." },
        desconocido: { dias: 21, msg: "Varios", color: "#64748b", care: "Échale un ojo antes de usarlo, si huele raro o se ve diferente, mejor no te arriesgues." }
    };

    function aplicarTema() {
        const hora = new Date().getHours();
        const body = document.getElementById('body-tag');
        if (hora >= 18 || hora < 6) body.classList.add('dark-mode');
        document.getElementById('msg').innerText = (hora >= 18 || hora < 6) ? "Modo Noche 🌙" : "Modo Día ☀️";
    }

    function obtenerCategoria(nombre) {
        const n = nombre.toLowerCase();
        if (n.includes("leche") || n.includes("crema") || n.includes("yogurt") || n.includes("queso") || n.includes("arroz")) return CATEGORIAS.lacteos;
        if (n.includes("pollo") || n.includes("carne") || n.includes("jamon") || n.includes("pescado")) return CATEGORIAS.carnes;
        if (n.includes("frijol") || n.includes("pasta") || n.includes("aceite") || n.includes("lata")) return CATEGORIAS.granos;
        if (n.includes("sal") || n.includes("ajo") || n.includes("pimienta") || n.includes("clavo")) return CATEGORIAS.especias;
        if (n.includes("cafe") || n.includes("café")) return CATEGORIAS.cafe;
        if (n.includes("galleta") || n.includes("papas") || n.includes("sabritas")) return CATEGORIAS.snacks;
        return CATEGORIAS.desconocido;
    }

    function abrirIA(nombre, care) {
        document.getElementById('ia-consejo').innerText = care;
        document.getElementById('modal-ia').style.display = 'flex';
    }

    function cerrarIA() { document.getElementById('modal-ia').style.display = 'none'; }

    function render() {
        const list = document.getElementById('main-list');
        localStorage.setItem('ecocesta_data', JSON.stringify(productos));
        if (productos.length === 0) {
            list.innerHTML = `<div style="text-align:center; padding-top:60px;"><p style="color:var(--text-sec);">No hay productos registrados</p></div>`;
            return;
        }
        list.innerHTML = '';
        productos.forEach((p, i) => {
            list.innerHTML += `
                <div class="card" onclick="abrirIA('${p.nombre}', '${p.care}')">
                    <div style="display:flex; align-items:center; width:100%;">
                        <div class="status-dot" style="background-color:${p.color};"></div>
                        <div class="info" style="width:100%;">
                            <h3>${p.nombre}</h3>
                            <p>${p.marca} • Ingreso: ${p.fechaIngreso}</p>
                            <span class="vence-text" style="color:${p.color};">
                                Fecha vencimiento: ${p.venceFinal}
                            </span>
                        </div>
                    </div>
                    <button class="btn-delete" onclick="event.stopPropagation(); eliminar(${i});">✕</button>
                </div>`;
        });
    }

    function eliminar(i) { productos.splice(i, 1); render(); }

    function procesarProducto(nombre, marca) {
        const cat = obtenerCategoria(nombre);
        const hoy = new Date();
        const fechaIngresoStr = hoy.toLocaleDateString('es-MX', { day: 'numeric', month: 'short' });
        const fechaFinal = new Date();
        fechaFinal.setDate(hoy.getDate() + cat.dias);
        const venceFinalStr = fechaFinal.toLocaleDateString('es-MX', { day: '2-digit', month: '2-digit', year: 'numeric' });

        productos.unshift({ 
            nombre, marca, 
            fechaIngreso: fechaIngresoStr,
            venceFinal: venceFinalStr,
            color: cat.color,
            care: cat.care
        });
        render();
    }

    async function buscarProducto(codigo) {
        try {
            const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${codigo}.json`);
            const data = await res.json();
            if (data.status === 1) return { nombre: data.product.product_name, marca: data.product.brands || "S/M" };
        } catch (e) {}
        return null;
    }

    function agregarManual() {
        const nombre = prompt("Nombre:"); if (!nombre) return;
        const marca = prompt("Marca:", "Manual");
        procesarProducto(nombre, marca);
    }

    let isScanning = false;
    function toggleScanner() {
        const view = document.getElementById('interactive');
        if (!isScanning) {
            view.style.display = 'block'; isScanning = true;
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: view, constraints: { facingMode: "environment" } },
                decoder: { readers: ["ean_reader"] }
            }, (err) => { if (!err) Quagga.start(); });
        } else { stopScan(); }
    }

    function stopScan() { Quagga.stop(); document.getElementById('interactive').style.display = 'none'; isScanning = false; }

    Quagga.onDetected(async (data) => {
        if (data.codeResult.code.length < 12) return;
        stopScan();
        let info = await buscarProducto(data.codeResult.code);
        if (!info) {
            const nom = prompt("No detectado. ¿Qué es?"); if(!nom) return;
            info = { nombre: nom, marca: "Escaneado" };
        }
        procesarProducto(info.nombre, info.marca);
    });

</script>
</body>
</html>
